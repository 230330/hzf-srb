server:
  port: 8084
spring:
  profiles:
    active: dev # 环境设置
  application:
    name: service-core # 应用名称
  
  datasource: # 数据源
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/srb_base?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 123456

# MyBatis-Plus 配置信息

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 日志实现
  global-config: # 全局配置
    db-config: # 数据库配置
      id-type: auto # 主键类型
      logic-delete-field: deleted # 逻辑删除字段
      logic-delete-value: 1 # 逻辑删除值
      logic-not-delete-value: 0 # 逻辑未删除值
  mapper-locations: classpath*:mapper/*.xml

# 日志级别 分为：TRACE, DEBUG, INFO, WARN, ERROR, ALL 和 OFF
#默认情况下，spring boot从控制台打印出来的日志级别只有INFO及以上级别，可以配置日志级别
